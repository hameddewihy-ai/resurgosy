<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل — RESURGO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: #f7f1eb;
      color: #1f2a38;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(31,42,56,0.10);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1 { font-size: 1.35rem; font-weight: 900; margin-bottom: 0.5rem; }
    p  { font-size: 0.875rem; color: #64748b; line-height: 1.6; margin-bottom: 1.75rem; }
    a  {
      display: inline-block;
      background: #f37124;
      color: white;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 0.65rem 2rem;
      border-radius: 0.75rem;
      text-decoration: none;
    }
    a:hover { background: #e06515; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو أنك غير متصل حالياً. تحقق من اتصالك وحاول مجدداً، أو تصفح الصفحات التي زرتها من قبل — فهي متاحة بدون إنترنت.</p>
    <a href="/" onclick="location.reload(); return false;">إعادة المحاولة</a>
  </div>
</body>
</html>
